<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TransLingo">
<meta name="theme-color" content="#f5f0e8">
<meta name="description" content="英語⇄日本語 翻訳＋単語帳アプリ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-translingo.png">
<link rel="apple-touch-icon-precomposed" href="icon-translingo.png">
<title>TransLingo</title>
<style>
:root {
  --ink: #1a1410; --paper: #f5f0e8; --paper2: #ede7d9;
  --warm: #c8a96e; --accent: #8b3a3a; --accent2: #3a6b8b;
  --muted: #8a7d6a; --border: rgba(26,20,16,0.13); --radius: 14px;
}
body.dark {
  --ink: #eee8dc; --paper: #1a1714; --paper2: #242018;
  --warm: #c8a96e; --accent: #c97070; --accent2: #6b9fc8;
  --muted: #7a7060; --border: rgba(255,255,255,0.10);
}
body.dark .nav { background: rgba(26,23,20,0.97); }
body.dark textarea, body.dark .icard, body.dark .rcard,
body.dark .ventry, body.dark .vsearch, body.dark .sinput,
body.dark .schip, body.dark .vftab, body.dark .btn-ghost,
body.dark .btn-copy, body.dark .btn-io, body.dark .style-wrap { background: #242018; color: var(--ink); }
body.dark .ifoot, body.dark .rhead, body.dark .style-header { background: #1a1714; }
body.dark .style-chips-wrap { background: #1a1714; }
body.dark .chip { background: #242018; color: var(--ink); }
body.dark .chip.saved { background: #1a2a38; }
body.dark .ccard { background: linear-gradient(135deg,#2a2318,#221e14); }
body.dark .cbody, body.dark .sent-detail { color: #c8b89a; }
body.dark .sent-struct { background: #1a2a1a; color: #8fc88f; }
body.dark .vex { background: #1a2233; }
body.dark .btn-del { background: #2a2018; }
body.dark .sbadge.ok { background: #1a2e1a; }
body.dark .sbadge.ng { background: #2e1a1a; }
body.dark .snote { background: #242018; }
body.dark .vftab.on { background: var(--accent); }
body.dark .schip.on { background: var(--accent); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { touch-action: manipulation; height: 100%; }
body { font-family: 'Hiragino Mincho ProN','Yu Mincho','Georgia',serif; background: var(--paper); color: var(--ink); font-size: 15px; }

/* NAV */
.nav { background: rgba(245,240,232,0.97); border-bottom: 1px solid var(--border); padding: 10px 16px 0; position: sticky; top: 0; z-index: 50; padding-top: env(safe-area-inset-top, 10px); }
.nav-inner-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; }
.logo { font-size: 20px; font-weight: 700; }
.logo b { color: var(--accent); }
.btn-dark { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--paper2); font-size: 16px; color: var(--ink); }
.btn-dark:active { opacity: .7; }
body.dark .btn-dark { background: #2a2018; }
.tabs { display: flex; }
.tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 10px; letter-spacing: 0.05em; color: var(--muted); background: none; border: none; cursor: pointer; position: relative; -webkit-appearance: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
.tab.on { color: var(--accent); }
.tab.on::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: var(--accent); border-radius: 2px; }
.ti { display: block; font-size: 16px; margin-bottom: 1px; }

/* PAGES */
.pg { display: none; padding: 14px 14px calc(env(safe-area-inset-bottom, 12px) + 14px); }
.pg.on { display: block; }

/* TRANSLATE */
.dir { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
.lang { font-size: 16px; font-weight: 600; min-width: 76px; text-align: center; }
.swap { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--warm); background: var(--paper2); color: var(--warm); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-appearance: none; touch-action: manipulation; flex-shrink: 0; }
.swap:active { background: var(--warm); color: #fff; }
.icard { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: 0 2px 12px rgba(26,20,16,.07); overflow: hidden; margin-bottom: 12px; }
textarea { width: 100%; min-height: 110px; padding: 13px; font-size: 15px; line-height: 1.75; font-family: inherit; border: none; resize: none; background: transparent; color: var(--ink); outline: none; display: block; -webkit-appearance: none; }
textarea::placeholder { color: var(--muted); }
.ifoot { display: flex; align-items: center; gap: 7px; padding: 7px 11px; border-top: 1px solid var(--border); background: var(--paper2); }
.cc { font-size: 11px; color: var(--muted); flex: 1; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; -webkit-appearance: none; outline: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: inherit; }
.btn:active { opacity: .6; }
.btn-ghost { padding: 7px 13px; min-height: 34px; border-radius: 18px; border: 1px solid var(--border); background: #fff; font-size: 13px; color: var(--muted); }
.btn-primary { padding: 7px 18px; min-height: 34px; border-radius: 18px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; }
.btn-primary:disabled { opacity: .4; }
.btn-copy { padding: 4px 10px; min-height: 28px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 11px; color: var(--muted); }
.btn-copy:active { background: var(--warm); color: #fff; border-color: var(--warm); }
.btn-del { width: 34px; height: 34px; border-radius: 50%; background: var(--paper2); color: var(--muted); font-size: 13px; flex-shrink: 0; }
.btn-del:active { background: #f0d0d0; color: var(--accent); }
.btn-speak { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: #fff; color: var(--accent2); font-size: 15px; flex-shrink: 0; }
.btn-speak:active { background: var(--accent2); color: #fff; }
.btn-full { width: 100%; padding: 14px; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 17px; font-weight: 700; display: block; }

/* RESULT */
.fade { animation: fu .3s ease both; }
@keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.rcard { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: 0 2px 12px rgba(26,20,16,.07); overflow: hidden; margin-bottom: 10px; }
.rhead { display: flex; align-items: center; padding: 10px 13px; background: var(--paper2); border-bottom: 1px solid var(--border); gap: 8px; }
.rlabel { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); flex: 1; }
.rbody { padding: 13px; font-size: 16px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
.ccard { background: linear-gradient(135deg,#fdf6ec,#f5ede0); border-radius: var(--radius); border: 1.5px solid rgba(200,169,110,.3); padding: 13px; margin-bottom: 10px; }
.ctitle { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--warm); margin-bottom: 7px; }
.cbody { font-size: 13px; line-height: 1.85; color: #4a3d2e; white-space: pre-wrap; }

/* VOCAB CHIPS IN RESULT */
.vsec { margin-bottom: 10px; }
.vtitle { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; min-height: 40px; background: #fff; border: 1.5px solid var(--border); border-radius: 22px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.05); touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-appearance: none; outline: none; font-family: inherit; }
.chip:active { opacity: .6; }
.chip.saved { border-color: var(--accent2); background: #e8f1f8; }
.cen { font-size: 14px; font-weight: 600; }
.cja { font-size: 11px; color: var(--muted); }
.chip.saved .cja { color: var(--accent2); }
.cplus { font-size: 13px; color: var(--warm); }
.chip.saved .cplus { color: var(--accent2); }

/* LOADER */
.loader { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); padding: 36px 20px; text-align: center; margin-bottom: 10px; }
.dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 9px; }
.dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--warm); animation: bop 1.2s infinite; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:none}30%{transform:translateY(-9px)}}
.ltext { font-size: 12px; color: var(--muted); }

/* VOCAB PAGE */
.vbhead { display: flex; align-items: baseline; gap: 9px; margin-bottom: 12px; }
.vbtitle { font-size: 22px; font-weight: 700; }
.vbcnt { font-size: 12px; color: var(--muted); }
.vsearch { width: 100%; padding: 11px 15px; border-radius: 22px; border: 1.5px solid var(--border); background: #fff; font-size: 14px; font-family: inherit; color: var(--ink); outline: none; margin-bottom: 12px; display: block; -webkit-appearance: none; box-shadow: 0 1px 5px rgba(0,0,0,.05); }
.vsearch:focus { border-color: var(--warm); }

/* 単語/フレーズ タブ */
.vfilter { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

/* 品詞フィルタ - 大項目タブと明確に差別化 */
.pos-filter-wrap { background: var(--paper2); border-radius: 12px; padding: 12px 14px 12px; margin-bottom: 12px; border: 1px solid var(--border); }
body.dark .pos-filter-wrap { background: #242018; }
.pos-filter-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
.pos-divider { height: 1px; background: var(--border); margin-bottom: 10px; }
.pos-filter-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
.postab { padding: 4px 12px; min-height: 28px; border-radius: 14px; border: 1px solid var(--border); background: #fff; font-size: 12px; color: var(--muted); cursor: pointer; -webkit-appearance: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: inherit; }
body.dark .postab { background: #1a1714; }
.postab.on { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.postab:active { opacity: .7; }
.vftab { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; color: var(--muted); cursor: pointer; -webkit-appearance: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: inherit; }
.vftab.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.vlist { display: flex; flex-direction: column; gap: 9px; }
.ventry { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); padding: 12px 13px; display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 1px 5px rgba(0,0,0,.05); }
.vmain { flex: 1; min-width: 0; }
.vtype { font-size: 9px; letter-spacing: .07em; text-transform: uppercase; color: var(--warm); background: rgba(200,169,110,.15); padding: 2px 6px; border-radius: 4px; margin-bottom: 3px; display: inline-block; }
.ven { font-size: 17px; font-weight: 700; margin-bottom: 1px; }
.vpron { font-size: 12px; color: var(--accent2); margin-bottom: 3px; font-style: italic; }
.vja { font-size: 13px; color: var(--muted); }
.vbtns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.eico { font-size: 40px; margin-bottom: 9px; opacity: .35; }
.etitle { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.esub { font-size: 13px; line-height: 1.6; }

/* SETTINGS */
.slabel { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.sinput { width: 100%; padding: 13px 15px; border-radius: var(--radius); border: 1.5px solid var(--border); background: #fff; font-size: 13px; color: var(--ink); outline: none; display: block; margin-bottom: 8px; -webkit-appearance: none; }
.sinput:focus { border-color: var(--warm); }
.sbadge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 10px; border-radius: 12px; margin-bottom: 16px; }
.sbadge.ok { background: #e6f4ea; color: #1e7e34; }
.sbadge.ng { background: #fce8e8; color: #c0392b; }
.snote { font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 12px; padding: 12px; background: var(--paper2); border-radius: 10px; border-left: 3px solid var(--warm); }
.errbox { background:#fff; border-radius:var(--radius); border:1.5px solid #f0d0d0; padding:13px; margin-bottom:10px; font-size:13px; color:var(--accent); line-height:1.7; word-break:break-all; }
.token-bar { background:var(--paper2); border-radius:10px; margin-bottom:10px; padding:8px 13px; font-size:11px; }
body.dark .token-bar { background:#242018; }
.token-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.token-row + .token-row { margin-top:5px; padding-top:5px; border-top:1px solid var(--border); }
.token-total { opacity:.75; }
.token-item { display:flex; align-items:center; gap:3px; color:var(--muted); font-family:'DM Mono',monospace,inherit; }
.token-item b { color:var(--ink); font-weight:600; }
.usage-card { background:#fff; border-radius:var(--radius); border:1.5px solid var(--border); overflow:hidden; margin-bottom:10px; }
body.dark .usage-card { background:#242018; }
.usage-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; }
.usage-row:last-child { border-bottom:none; }
.usage-row span { color:var(--muted); }
.usage-row b { font-weight:700; }
.usage-cost b { color:var(--accent); }
.btn-reset-stats { width:100%; padding:11px; border-radius:var(--radius); border:1.5px solid var(--border); background:var(--paper2); color:var(--muted); font-size:13px; font-family:inherit; cursor:pointer; -webkit-appearance:none; touch-action:manipulation; margin-bottom:16px; }
.btn-reset-stats:active { background:#f0d0d0; color:var(--accent); }
/* MANUAL ADD MODAL */
.btn-add-word { padding: 6px 12px; min-height: 32px; border-radius: 16px; border: 1.5px solid var(--accent); background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; }
.btn-add-word:active { opacity: .7; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.on { display: flex; }
.modal { background: var(--paper); border-radius: 20px 20px 0 0; padding: 20px 18px calc(env(safe-area-inset-bottom,16px) + 20px); width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.modal-field { margin-bottom: 13px; }
.modal-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
.modal-input { width: 100%; padding: 11px 13px; border-radius: var(--radius); border: 1.5px solid var(--border); background: #fff; font-size: 14px; font-family: inherit; color: var(--ink); outline: none; -webkit-appearance: none; display: block; }
.modal-input:focus { border-color: var(--warm); }
body.dark .modal { background: #1a1714; }
body.dark .modal-input { background: #242018; color: var(--ink); border-color: var(--border); }
.modal-types { display: flex; flex-wrap: wrap; gap: 7px; }
.mtype { padding: 6px 14px; min-height: 32px; border-radius: 16px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; color: var(--muted); cursor: pointer; -webkit-appearance: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: inherit; }
.mtype.on { background: var(--accent2); color: #fff; border-color: var(--accent2); }
body.dark .mtype { background: #242018; }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.m-preview-card { background: var(--paper2); border-radius: var(--radius); padding: 13px; margin-bottom: 4px; }
body.dark .m-preview-card { background: #242018; }
.m-preview-en { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.m-preview-pron { font-size: 12px; color: var(--accent2); font-style: italic; margin-bottom: 4px; }
.m-preview-type { font-size: 9px; letter-spacing: .07em; text-transform: uppercase; color: var(--warm); background: rgba(200,169,110,.15); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
.m-preview-ja { font-size: 14px; color: var(--ink); margin-bottom: 8px; }
.m-preview-ex { font-size: 12px; font-style: italic; color: var(--accent2); padding: 6px 10px; background: #f0f5fb; border-radius: 7px; border-left: 2px solid var(--accent2); margin-bottom: 3px; }
body.dark .m-preview-ex { background: #1a2233; }
.m-preview-ex-ja { font-size: 12px; color: var(--muted); padding-left: 10px; }
.m-looking { text-align: center; padding: 18px; color: var(--muted); font-size: 13px; }
.m-looking .dots { justify-content: center; margin: 0 auto 6px; }
.modal-cancel { flex: 1; padding: 13px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--paper2); font-size: 15px; color: var(--muted); }
.modal-save { flex: 2; padding: 13px; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; border: none; }
.modal-save:active { opacity: .8; }
.modal-cancel:active { opacity: .7; }

/* STYLE SELECTOR */
.style-wrap { background: #fff; border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: 0 2px 12px rgba(26,20,16,.07); overflow: hidden; margin-bottom: 10px; }
.style-header { display: flex; align-items: center; padding: 10px 13px; }
.style-toggle-wrap { display: flex; align-items: center; gap: 9px; cursor: pointer; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
.stoggle { width: 38px; height: 22px; border-radius: 11px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
.stoggle.on { background: var(--accent); }
.stoggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.stoggle.on .stoggle-thumb { left: 18px; }
.style-toggle-label { font-size: 13px; font-weight: 600; color: var(--ink); }
.style-chips-wrap { display: none; border-top: 1px solid var(--border); padding: 10px 12px; background: var(--paper2); }
.style-chips-wrap.on { display: block; }
.style-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.schip { padding: 6px 13px; min-height: 34px; border-radius: 18px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; color: var(--ink); cursor: pointer; -webkit-appearance: none; touch-action: manipulation; -webkit-user-select: none; user-select: none; font-family: inherit; transition: all .15s; }
.schip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.schip:active { opacity: .7; }
/* SENTENCE BREAKDOWN */
.rnote { font-size: 12px; color: var(--muted); padding: 6px 13px 10px; font-style: italic; }
.sent-block { padding: 14px 0; border-bottom: 1px solid var(--border); }
.sent-block:last-child { border-bottom: none; padding-bottom: 0; }
.sent-block:first-child { padding-top: 0; }
.sent-num { font-size: 16px; margin-bottom: 4px; }
.sent-orig { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; line-height: 1.65; font-style: italic; }
.sent-tr { font-size: 13px; color: var(--accent2); margin-bottom: 10px; line-height: 1.65; }
.sent-bd { margin: 0 0 10px 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 4px; }
.sent-bd li { font-size: 12.5px; color: #4a3d2e; line-height: 1.6; padding-left: 10px; border-left: 2px solid var(--warm); }
.bd-part { font-weight: 700; color: var(--ink); }
.sent-struct { font-size: 13px; color: #3a4a3a; background: #f0f7f0; border-radius: 8px; padding: 10px 12px; line-height: 1.85; margin-top: 6px; white-space: pre-wrap; }
.vsection-title { font-size: 13px; font-weight: 700; color: var(--ink); padding: 4px 2px 8px; border-bottom: 2px solid var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.vgroup-title { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--warm); background: rgba(200,169,110,.12); padding: 4px 10px; border-radius: 6px; margin: 10px 0 6px; display: inline-block; }
.vex { font-size: 13px; font-style: italic; color: var(--accent2); margin-top: 6px; line-height: 1.6; padding: 6px 10px; background: #f0f5fb; border-radius: 7px; border-left: 2px solid var(--accent2); }
.vex-ja { font-size: 12px; color: var(--muted); margin-top: 2px; padding-left: 10px; line-height: 1.5; }
.vbhead { flex-wrap: wrap; gap: 6px; }
.vb-actions { display: flex; gap: 6px; margin-left: auto; }
.btn-io { padding: 6px 11px; min-height: 32px; border-radius: 16px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; color: var(--ink); }
.btn-io:active { background: var(--paper2); }

/* TOAST */
.toast { position: fixed; bottom: calc(env(safe-area-inset-bottom, 12px) + 14px); left: 50%; transform: translateX(-50%) translateY(14px); background: #1a1410; color: #fff; padding: 9px 18px; border-radius: 22px; font-size: 13px; opacity: 0; transition: opacity .22s, transform .22s; pointer-events: none; z-index: 9999; white-space: nowrap; max-width: 90vw; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner-row">
    <div class="logo">Trans<b>Lingo</b></div>
    <button class="btn btn-dark" id="btn-dark">🌙</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="t-tr"><span class="ti">⇄</span>翻訳</button>
    <button class="tab" id="t-vb"><span class="ti">📖</span>単語帳</button>
    <button class="tab" id="t-st"><span class="ti">⚙️</span>設定</button>
  </div>
</div>

<!-- 翻訳 -->
<div class="pg on" id="pg-tr">
  <div class="dir">
    <span class="lang" id="src">English</span>
    <button class="swap btn" id="btn-swap">⇄</button>
    <span class="lang" id="dst">日本語</span>
  </div>
  <div class="style-wrap" id="style-wrap">
    <div class="style-header">
      <label class="style-toggle-wrap">
        <div class="stoggle" id="style-toggle">
          <div class="stoggle-thumb"></div>
        </div>
        <span class="style-toggle-label">文体を調整</span>
      </label>
    </div>
    <div class="style-chips-wrap" id="style-chips-wrap">
      <div class="style-chips">
        <button class="schip" data-style="丁寧">🤓 丁寧</button>
        <button class="schip" data-style="カジュアル">😎 カジュアル</button>
        <button class="schip" data-style="友達とチャット">💬 友達チャット</button>
        <button class="schip" data-style="Z世代風">🧢 Z世代</button>
        <button class="schip" data-style="ビジネスメール">📧 ビジネスメール</button>
        <button class="schip" data-style="SNSつぶやき">🤳 SNSつぶやき</button>
        <button class="schip" data-style="子ども向け">🐣 子ども向け</button>
        <button class="schip" data-style="書き言葉・フォーマル">📝 フォーマル</button>
      </div>
    </div>
  </div>

  <div class="icard">
    <textarea id="txt" placeholder="ここに英文を入力してください…"></textarea>
    <div class="ifoot">
      <span class="cc" id="cc">0 文字</span>
      <button class="btn btn-ghost" id="btn-clear">クリア</button>
      <button class="btn btn-primary" id="btn-go">翻訳する</button>
    </div>
  </div>
  <div id="result"></div>
</div>

<!-- 単語帳 -->
<div class="pg" id="pg-vb">
  <div class="vbhead">
    <span class="vbtitle">単語帳</span>
    <span class="vbcnt" id="vcnt">0 語</span>
    <div class="vb-actions">
      <button class="btn btn-add-word" id="btn-add-word">＋ 追加</button>
      <button class="btn btn-io" id="btn-export">⬆️ 書き出し</button>
      <button class="btn btn-io" id="btn-import-trigger">⬇️ 読み込み</button>
    </div>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none">

  <!-- 手動追加モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">単語を追加</div>
      <div class="modal-field">
        <label class="modal-label">英語を入力</label>
        <input class="modal-input" id="m-en" type="text" placeholder="例: perseverance" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <!-- 自動生成結果プレビュー -->
      <div id="m-preview"></div>
      <div class="modal-btns">
        <button class="btn modal-cancel" id="modal-cancel">キャンセル</button>
        <button class="btn modal-save" id="modal-save">🔍 調べて追加</button>
      </div>
    </div>
  </div>
  <input class="vsearch" id="vsearch" type="search" placeholder="単語を検索…">
  <div class="vfilter">
    <button class="vftab on" id="vf-all">すべて</button>
    <button class="vftab" id="vf-word">単語</button>
    <button class="vftab" id="vf-phrase">フレーズ</button>
  </div>
  <!-- 品詞フィルタ（単語タブ選択時のみ表示）-->
  <div class="pos-filter-wrap" id="pos-filter" style="display:none">
    <div class="pos-filter-label">品詞で絞り込む</div>
    <div class="pos-divider"></div>
    <div class="pos-filter-tabs">
      <button class="postab on" id="vp-all">すべて</button>
      <button class="postab" id="vp-noun">名詞</button>
      <button class="postab" id="vp-verb">動詞</button>
      <button class="postab" id="vp-adj">形容詞</button>
      <button class="postab" id="vp-adv">副詞</button>
      <button class="postab" id="vp-prep">前置詞</button>
      <button class="postab" id="vp-conj">接続詞</button>
      <button class="postab" id="vp-other">その他</button>
    </div>
  </div>
  <div class="vlist" id="vlist"></div>
</div>

<!-- 設定 -->
<div class="pg" id="pg-st">
  <div class="slabel">Google Gemini API キー</div>
  <input class="sinput" id="apikey-input" type="password" placeholder="AIza…" autocomplete="off">
  <div id="sbadge"></div>
  <button class="btn btn-full" id="btn-save">保存する</button>
  <div class="snote">
    APIキーはこのデバイス内にのみ保存されます。<br><br>
    取得: <a href="https://aistudio.google.com" style="color:var(--accent2)">aistudio.google.com</a> → Get API key
  </div>

  <div class="slabel" style="margin-top:20px">使用量・コスト</div>
  <div class="usage-card" id="usage-stats"></div>
  <button class="btn btn-reset-stats" id="btn-reset-stats">統計をリセット</button>
</div>

<div class="toast" id="toast"></div>

<script>
var GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

var S = { dir:'en-ja', vocab:[], filter:'', vfilter:'all', posFilter:'all', pending:[], style:'' };
// 累計トークン統計
var stats = { totalIn:0, totalOut:0, totalReq:0 };
try { stats = JSON.parse(localStorage.getItem('tl_stats') || '{"totalIn":0,"totalOut":0,"totalReq":0}'); } catch(e){}
try { S.vocab = JSON.parse(localStorage.getItem('tl_vocab')||'[]'); } catch(e){}
var apiKey = '';
try { apiKey = localStorage.getItem('tl_gemini_key')||''; } catch(e){}

// Dark mode
var isDark = false;
try { isDark = localStorage.getItem('tl_dark') === '1'; } catch(e){}
if (isDark) document.body.classList.add('dark');

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('btn-dark').textContent = isDark ? '☀️' : '🌙';
  try { localStorage.setItem('tl_dark', isDark ? '1' : '0'); } catch(e){}
}

// Set initial icon after DOM ready (script is at end of body so DOM is ready)

// iOS-safe tap
function tap(el, fn) {
  if (!el) return;
  var moved = false;
  el.addEventListener('touchstart', function(){ moved=false; }, {passive:true});
  el.addEventListener('touchmove',  function(){ moved=true;  }, {passive:true});
  el.addEventListener('touchend', function(e){ if(moved) return; e.preventDefault(); fn(e); });
  el.addEventListener('click', function(e){ fn(e); });
}

// Tabs
function showPage(id) {
  ['tr','vb','st'].forEach(function(p){
    document.getElementById('pg-'+p).classList.remove('on');
    document.getElementById('t-'+p).classList.remove('on');
  });
  document.getElementById('pg-'+id).classList.add('on');
  document.getElementById('t-'+id).classList.add('on');
  if (id==='vb') renderVocab();
  if (id==='st') updateStatsInSettings();
}
tap(document.getElementById('t-tr'), function(){ showPage('tr'); });
tap(document.getElementById('btn-dark'), function(){ toggleDark(); });

// Style toggle
tap(document.getElementById('style-toggle'), function(){
  var tog = document.getElementById('style-toggle');
  var wrap = document.getElementById('style-chips-wrap');
  var isOn = tog.classList.toggle('on');
  wrap.classList.toggle('on', isOn);
  if (!isOn) {
    S.style = '';
    document.querySelectorAll('.schip').forEach(function(c){ c.classList.remove('on'); });
  }
});

// Style chip select
document.querySelectorAll('.schip').forEach(function(el){
  tap(el, function(){
    var isActive = el.classList.contains('on');
    document.querySelectorAll('.schip').forEach(function(c){ c.classList.remove('on'); });
    if (!isActive) {
      el.classList.add('on');
      S.style = el.getAttribute('data-style');
    } else {
      S.style = '';
    }
  });
});
tap(document.getElementById('t-vb'), function(){ showPage('vb'); });
tap(document.getElementById('t-st'), function(){ showPage('st'); });

// Swap
tap(document.getElementById('btn-swap'), function(){
  S.dir = S.dir==='en-ja' ? 'ja-en' : 'en-ja';
  document.getElementById('src').textContent = S.dir==='en-ja' ? 'English' : '日本語';
  document.getElementById('dst').textContent = S.dir==='en-ja' ? '日本語' : 'English';
  document.getElementById('txt').placeholder  = S.dir==='en-ja' ? 'ここに英文を入力してください…' : 'ここに日本語を入力してください…';
  document.getElementById('result').innerHTML = '';
  S.pending = [];
});

// Char count
document.getElementById('txt').addEventListener('input', function(){
  document.getElementById('cc').textContent = this.value.length + ' 文字';
});

// Clear
tap(document.getElementById('btn-clear'), function(){
  document.getElementById('txt').value = '';
  document.getElementById('cc').textContent = '0 文字';
  document.getElementById('result').innerHTML = '';
  S.pending = [];
});

// Vocab filter tabs
tap(document.getElementById('vf-all'),    function(){ setVFilter('all'); });
tap(document.getElementById('vf-word'),   function(){ setVFilter('word'); });
tap(document.getElementById('vf-phrase'), function(){ setVFilter('phrase'); });
['all','noun','verb','adj','adv','prep','conj','other'].forEach(function(p){
  tap(document.getElementById('vp-'+p), function(){ setPosFilter(p); });
});
function setVFilter(f) {
  S.vfilter = f;
  ['all','word','phrase'].forEach(function(x){
    document.getElementById('vf-'+x).classList.toggle('on', x===f);
  });
  // 品詞タブは単語タブ選択時のみ表示
  var posFilter = document.getElementById('pos-filter');
  if (f === 'word') {
    posFilter.style.display = 'flex';
  } else {
    posFilter.style.display = 'none';
    S.posFilter = 'all';
    ['all','noun','verb','adj','adv','prep','conj','other'].forEach(function(x){
      var el = document.getElementById('vp-'+x);
      if (el) el.classList.toggle('on', x==='all');
    });
  }
  renderVocab();
}

function setPosFilter(p) {
  S.posFilter = p;
  ['all','noun','verb','adj','adv','prep','conj','other'].forEach(function(x){
    var el = document.getElementById('vp-'+x);
    if (el) el.classList.toggle('on', x===p);
  });
  renderVocab();
}

// Translate
tap(document.getElementById('btn-go'), function(){
  var text = document.getElementById('txt').value.trim();
  if (!text) return;
  if (!apiKey) { toast('⚙️ 設定でAPIキーを入力してください'); showPage('st'); return; }

  var btn = document.getElementById('btn-go');
  btn.disabled = true;
  document.getElementById('result').innerHTML =
    '<div class="loader"><div class="dots"><span></span><span></span><span></span></div><div class="ltext">翻訳中…</div></div>';

  var sl = S.dir==='en-ja' ? '英語' : '日本語';
  var dl = S.dir==='en-ja' ? '日本語' : '英語';

  var prompt = '優秀な翻訳者・語学教師として以下の'+sl+'を'+dl+'に翻訳してください。JSONのみ回答（説明不要）:\n'
    + '{"translation":"訳文（複数文は\\n改行）","note":"全体のニュアンス・注意点を1文で（任意）",'
    + '"sentences":[{"original":"元の文または節","translation":"訳","points":["ポイント1","ポイント2"],"structure":"この表現・文全体の意味やよく使われるパターンを自然な言葉で説明（例文があれば含める）"}],'
    + '"vocab":[{"en":"単語/フレーズ","ja":"意味","type":"noun|verb|adj|adv|phrase","pron":"IPA","example":"例文","example_ja":"例文訳"}]}\n'
    + 'sentencesのルール: 文・節ごとに分解。pointsは各語句の意味を「単語 = 意味」形式で2〜5個。structureは品詞名を使わず、意味・使い方・パターン・例文を中心に自然な日本語で。vocab:重要語3〜6個。\n'
    + 'Text: '+text
    + (S.style ? '\n文体指定: 「'+S.style+'」のスタイルで翻訳・解説してください。' : '');

  fetch(GEMINI_URL + '?key=' + apiKey, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.3 }
    })
  })
  .then(function(r){ return r.text().then(function(t){ return {status:r.status,t:t}; }); })
  .then(function(r){
    var d;
    try { d = JSON.parse(r.t); } catch(e) { throw new Error('レスポンス解析エラー('+r.status+'): '+r.t.slice(0,200)); }
    if (d.error) throw new Error('APIエラー: '+(d.error.message||JSON.stringify(d.error)));
    var raw = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0] && d.candidates[0].content.parts[0].text;
    if (!raw) throw new Error('レスポンス異常: '+JSON.stringify(d).slice(0,200));
    var clean = raw.replace(/```json|```/g,'').trim();
    var start = clean.indexOf('{'), end = clean.lastIndexOf('}');
    if (start>=0 && end>start) clean = clean.slice(start,end+1);
    var p;
    try { p = JSON.parse(clean); } catch(e) { throw new Error('JSON解析エラー: '+clean.slice(0,200)); }
    S.pending = p.vocab || [];
    renderResult(p);
    // トークン情報（renderResult後に表示）
    var usage = d.usageMetadata || {};
    showTokenInfo(usage);
  })
  .catch(function(e){
    document.getElementById('result').innerHTML =
      '<div class="errbox">⚠️ '+esc(e.message)+'<br><small style="opacity:.6">APIキー設定済み: '+(apiKey?'Yes ('+apiKey.slice(0,8)+'...)':'No')+'</small></div>';
  })
  .finally(function(){ btn.disabled=false; });
});

function showTokenInfo(usage) {
  var inp = usage.promptTokenCount     || 0;
  var out = usage.candidatesTokenCount || 0;
  // 累計に加算して保存
  stats.totalIn  += inp;
  stats.totalOut += out;
  stats.totalReq += 1;
  try { localStorage.setItem('tl_stats', JSON.stringify(stats)); } catch(e){}
  // 設定タブが開いていれば即時更新
  updateStatsInSettings();
}

function renderResult(p) {
  var words   = S.pending.filter(function(v){ return v.type !== 'phrase'; });
  var phrases = S.pending.filter(function(v){ return v.type === 'phrase'; });

  function makeChips(arr) {
    return arr.map(function(v,i){
      var globalIdx = S.pending.indexOf(v);
      var sv = S.vocab.some(function(x){ return x.en===v.en; });
      return '<button class="chip'+(sv?' saved':'')+'" data-i="'+globalIdx+'">'
        +'<span class="cen">'+esc(v.en)+'</span>'
        +'<span class="cja">'+esc(v.ja)+'</span>'
        +'<span class="cplus">'+(sv?'✓':'＋')+'</span>'
        +'</button>';
    }).join('');
  }

  var vocabHtml = '';
  if (words.length) {
    vocabHtml += '<div class="vsec"><div class="vtitle">🔤 単語（タップで保存）</div><div class="chips" id="chips-w">'+makeChips(words)+'</div></div>';
  }
  if (phrases.length) {
    vocabHtml += '<div class="vsec"><div class="vtitle">💬 フレーズ（タップで保存）</div><div class="chips" id="chips-p">'+makeChips(phrases)+'</div></div>';
  }

  // 文ごとの解説HTML
  var sentHtml = '';
  if (p.sentences && p.sentences.length) {
    sentHtml = '<div class="ccard"><div class="ctitle">📐 文法解説</div>';
    for (var si=0; si<p.sentences.length; si++) {
      var s = p.sentences[si];
      // breakdown items
      // points: 語句の意味リスト
      var ptHtml = '';
      var ptArr = s.points || (s.breakdown ? s.breakdown.map(function(b){ return b.part+' = '+b.role; }) : []);
      if (ptArr.length) {
        ptHtml = '<ul class="sent-bd">';
        for (var bi=0; bi<ptArr.length; bi++) {
          ptHtml += '<li>'+esc(ptArr[bi])+'</li>';
        }
        ptHtml += '</ul>';
      }
      sentHtml += '<div class="sent-block">'
        +'<div class="sent-num">'+('①②③④⑤⑥⑦⑧⑨⑩'.charAt(si))+'</div>'
        +'<div class="sent-orig">'+esc(s.original)+'</div>'
        +'<div class="sent-tr">'+esc(s.translation)+'</div>'
        + ptHtml
        +(s.structure ? '<div class="sent-struct">'+esc(s.structure)+'</div>' : '')
      +'</div>';
    }
    sentHtml += '</div>';
  }

  document.getElementById('result').innerHTML =
    '<div class="fade">'
    +'<div class="rcard">'
      +'<div class="rhead"><span class="rlabel">翻訳</span>'
        +'<button class="btn btn-copy" data-copy="'+escA(p.translation||'')+'">コピー</button>'
      +'</div>'
      +'<div class="rbody">'+esc(p.translation)+'</div>'
    +(p.note ? '<div class="rnote">※ '+esc(p.note)+'</div>' : '')
    +'</div>'
    + sentHtml
    + vocabHtml
    +'</div>';

  document.querySelectorAll('.chip').forEach(function(el){
    tap(el, function(){ toggleChip(el); });
  });
  document.querySelectorAll('[data-copy]').forEach(function(el){
    tap(el, function(){ copyText(el.getAttribute('data-copy')); });
  });
}

function toggleChip(el) {
  var i = parseInt(el.getAttribute('data-i'),10);
  var v = S.pending[i]; if (!v) return;
  var idx = -1;
  for (var j=0; j<S.vocab.length; j++) { if(S.vocab[j].en===v.en){idx=j;break;} }
  if (idx>=0) {
    S.vocab.splice(idx,1);
    el.classList.remove('saved');
    el.querySelector('.cplus').textContent='＋';
    toast('削除しました');
  } else {
    S.vocab.unshift({en:v.en,ja:v.ja,type:v.type,pron:v.pron||'',example:v.example||'',example_ja:v.example_ja||'',d:Date.now()});
    el.classList.add('saved');
    el.querySelector('.cplus').textContent='✓';
    toast('📖 単語帳に保存しました');
  }
  try{ localStorage.setItem('tl_vocab',JSON.stringify(S.vocab)); }catch(e){}
  document.getElementById('vcnt').textContent = S.vocab.length+' 語';
document.getElementById('btn-dark').textContent = isDark ? '☀️' : '🌙';
}

// Vocab page
document.getElementById('vsearch').addEventListener('input', function(){
  S.filter = this.value.toLowerCase(); renderVocab();
});

function renderVocab() {
  document.getElementById('vcnt').textContent = S.vocab.length+' 語';
  document.getElementById('btn-dark').textContent = isDark ? '☀️' : '🌙';
  var tl = {noun:'名詞',verb:'動詞',phrase:'フレーズ',adj:'形容詞',adv:'副詞',prep:'前置詞',conj:'接続詞'};
  var list = document.getElementById('vlist');
  var knownTypes = ['noun','verb','adj','adv','prep','conj','phrase'];

  // ベースフィルタ
  var data = S.vocab.slice();
  if (S.vfilter === 'word')   data = data.filter(function(v){ return v.type !== 'phrase'; });
  if (S.vfilter === 'phrase') data = data.filter(function(v){ return v.type === 'phrase'; });

  // 品詞フィルタ（単語タブのみ）
  if (S.vfilter === 'word' && S.posFilter !== 'all') {
    if (S.posFilter === 'other') {
      data = data.filter(function(v){ return ['noun','verb','adj','adv','prep','conj'].indexOf(v.type) < 0; });
    } else {
      data = data.filter(function(v){ return v.type === S.posFilter; });
    }
  }

  // 検索
  if (S.filter) data = data.filter(function(v){ return v.en.toLowerCase().indexOf(S.filter)>=0||(v.ja||'').indexOf(S.filter)>=0; });

  if (!data.length) {
    list.innerHTML = '<div class="empty"><div class="eico">📖</div>'
      +'<div class="etitle">'+(S.filter?'見つかりません':'ここは空です')+'</div>'
      +'<div class="esub">'+(S.filter?'別のキーワードで試してください':'翻訳画面で単語をタップして保存しましょう')+'</div></div>';
    return;
  }

  // ABC順ソート
  data.sort(function(a,b){ return a.en.toLowerCase().localeCompare(b.en.toLowerCase()); });

  function makeEntryHtml(v) {
    return '<div class="ventry">'
      +'<div class="vmain">'
        +'<div class="ven">'+esc(v.en)+'</div>'
        +(v.pron ? '<div class="vpron">/'+esc(v.pron)+'/</div>' : '')
        +'<div class="vja">'+esc(v.ja)+'</div>'
        +(v.example ? '<div class="vex">'+esc(v.example)+'</div><div class="vex-ja">'+esc(v.example_ja)+'</div>' : '')
      +'</div>'
      +'<div class="vbtns">'
        +'<button class="btn btn-speak" data-word="'+escA(v.en)+'" title="読み上げ">🔊</button>'
        +'<button class="btn btn-del" data-en="'+escA(v.en)+'">✕</button>'
      +'</div>'
    +'</div>';
  }

  var html = '';
  var words   = data.filter(function(v){ return v.type !== 'phrase'; });
  var phrases = data.filter(function(v){ return v.type === 'phrase'; });

  if (S.vfilter === 'all') {
    if (words.length) {
      html += '<div class="vsection-title">📝 単語 ('+words.length+')</div>';
      html += words.map(makeEntryHtml).join('');
    }
    if (phrases.length) {
      html += '<div class="vsection-title" style="margin-top:18px">💬 フレーズ ('+phrases.length+')</div>';
      html += phrases.map(makeEntryHtml).join('');
    }
  } else if (S.vfilter === 'word') {
    if (S.posFilter === 'all') {
      // 品詞グループ分け
      var typeOrder = ['noun','verb','adj','adv','prep','conj',''];
      var groups = {};
      words.forEach(function(v){
        var t = (knownTypes.indexOf(v.type) >= 0 && v.type !== 'phrase') ? v.type : '';
        if (!groups[t]) groups[t] = [];
        groups[t].push(v);
      });
      typeOrder.forEach(function(t){
        if (!groups[t] || !groups[t].length) return;
        var label = t === '' ? 'その他' : (tl[t] || t);
        html += '<div class="vgroup-title">'+label+' ('+groups[t].length+')</div>';
        html += groups[t].map(makeEntryHtml).join('');
      });
    } else {
      // 個別品詞: リストのみ
      html += data.map(makeEntryHtml).join('');
    }
  } else if (S.vfilter === 'phrase') {
    html += phrases.map(makeEntryHtml).join('');
  }

  list.innerHTML = html || '<div class="empty"><div class="eico">📖</div><div class="etitle">ここは空です</div></div>';

  list.querySelectorAll('[data-en]').forEach(function(el){
    tap(el, function(){ deleteVocab(el.getAttribute('data-en')); });
  });
  list.querySelectorAll('[data-word]').forEach(function(el){
    tap(el, function(){ speak(el.getAttribute('data-word')); });
  });

}

// 音声読み上げ (en-US ネイティブアメリカン英語)
function speak(text) {
  if (!window.speechSynthesis) { toast('この端末は音声非対応です'); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1.0;

  // iOSでは音声リストの読み込みに時間がかかるため少し待つ
  function trySpeak() {
    var voices = window.speechSynthesis.getVoices();
    // en-USの音声を優先的に選ぶ
    var enUS = voices.filter(function(v){ return v.lang === 'en-US'; });
    if (enUS.length > 0) {
      // Samantha（iOS標準）やAlex等のネイティブ音声を優先
      var preferred = enUS.find(function(v){
        return v.name.indexOf('Samantha') >= 0 || v.name.indexOf('Alex') >= 0 || v.name.indexOf('Siri') >= 0;
      });
      u.voice = preferred || enUS[0];
    }
    window.speechSynthesis.speak(u);
  }

  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = function(){ trySpeak(); };
  } else {
    trySpeak();
  }
}

function deleteVocab(en) {
  S.vocab = S.vocab.filter(function(v){ return v.en!==en; });
  try{ localStorage.setItem('tl_vocab',JSON.stringify(S.vocab)); }catch(e){}
  renderVocab(); toast('削除しました');
}



// Settings
// Manual add word
var pendingWord = null;

tap(document.getElementById('btn-add-word'), function(){
  document.getElementById('m-en').value = '';
  document.getElementById('m-preview').innerHTML = '';
  document.getElementById('modal-save').textContent = '🔍 調べて追加';
  pendingWord = null;
  document.getElementById('modal-overlay').classList.add('on');
  setTimeout(function(){ document.getElementById('m-en').focus(); }, 300);
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('on');
  pendingWord = null;
}

tap(document.getElementById('modal-cancel'), function(){ closeModal(); });
tap(document.getElementById('modal-overlay'), function(e){
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

tap(document.getElementById('modal-save'), function(){
  // すでに情報取得済み → 保存
  if (pendingWord) {
    if (S.vocab.some(function(v){ return v.en.toLowerCase() === pendingWord.en.toLowerCase(); })) {
      toast('すでに登録されています'); return;
    }
    S.vocab.unshift(pendingWord);
    try{ localStorage.setItem('tl_vocab', JSON.stringify(S.vocab)); }catch(e){}
    closeModal();
    renderVocab();
    toast('📖 追加しました：' + pendingWord.en);
    return;
  }

  // 単語を調べる
  var en = document.getElementById('m-en').value.trim();
  if (!en) { toast('英語を入力してください'); return; }
  if (!apiKey) { toast('⚙️ 設定でAPIキーを入力してください'); return; }

  var saveBtn = document.getElementById('modal-save');
  saveBtn.disabled = true;
  document.getElementById('m-preview').innerHTML =
    '<div class="m-looking"><div class="dots"><span></span><span></span><span></span></div>調べています…</div>';

  var prompt = '以下の英単語/フレーズについて、JSONのみで回答（説明不要）: {"en":"'+en+'","ja":"日本語の意味","type":"noun|verb|adj|adv|phrase","pron":"IPA発音記号","example":"自然な英語例文","example_ja":"例文の日本語訳"} 単語: '+en;

  fetch(GEMINI_URL + '?key=' + apiKey, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.1 }
    })
  })
  .then(function(r){ return r.text().then(function(t){ return {status:r.status,t:t}; }); })
  .then(function(r){
    var d;
    try { d = JSON.parse(r.t); } catch(e) { throw new Error('通信エラー'); }
    if (d.error) throw new Error(d.error.message || 'APIエラー');
    var raw = d.candidates[0].content.parts[0].text;
    var clean = raw.replace(/```json|```/g,'').trim();
    var s = clean.indexOf('{'), e2 = clean.lastIndexOf('}');
    if (s>=0 && e2>s) clean = clean.slice(s,e2+1);
    var p = JSON.parse(clean);
    pendingWord = { en: p.en||en, ja: p.ja||'', type: p.type||'noun', pron: p.pron||'', example: p.example||'', example_ja: p.example_ja||'', d: Date.now() };

    var tl = {noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',phrase:'フレーズ'};
    document.getElementById('m-preview').innerHTML =
      '<div class="m-preview-card">'
      +'<div class="m-preview-type">'+(tl[p.type]||p.type||'')+'</div>'
      +'<div class="m-preview-en">'+esc(p.en||en)+'</div>'
      +(p.pron ? '<div class="m-preview-pron">/'+esc(p.pron)+'/</div>' : '')
      +'<div class="m-preview-ja">'+esc(p.ja)+'</div>'
      +(p.example ? '<div class="m-preview-ex">'+esc(p.example)+'</div><div class="m-preview-ex-ja">'+esc(p.example_ja)+'</div>' : '')
      +'</div>';
    saveBtn.textContent = '✅ 保存する';
  })
  .catch(function(e){
    document.getElementById('m-preview').innerHTML = '<div style="color:var(--accent);font-size:13px;padding:8px 0">⚠️ '+esc(e.message)+'</div>';
  })
  .finally(function(){ saveBtn.disabled = false; });
});

// Export
tap(document.getElementById('btn-export'), function(){
  if (!S.vocab.length) { toast('単語帳が空です'); return; }
  var json = JSON.stringify(S.vocab, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var date = new Date();
  var fname = 'translingo_' + date.getFullYear() + ('0'+(date.getMonth()+1)).slice(-2) + ('0'+date.getDate()).slice(-2) + '.json';
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('⬆️ ' + S.vocab.length + '語をエクスポートしました');
});

// Import trigger
tap(document.getElementById('btn-import-trigger'), function(){
  document.getElementById('import-file').click();
});

// Import file read
document.getElementById('import-file').addEventListener('change', function(){
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('形式が正しくありません');
      // merge: skip duplicates
      var added = 0;
      for (var i=0; i<imported.length; i++) {
        var v = imported[i];
        if (!v.en) continue;
        var exists = S.vocab.some(function(x){ return x.en === v.en; });
        if (!exists) { S.vocab.push(v); added++; }
      }
      try{ localStorage.setItem('tl_vocab', JSON.stringify(S.vocab)); }catch(ex){}
      renderVocab();
      toast('⬇️ ' + added + '語を読み込みました（重複除く）');
    } catch(err) {
      toast('⚠️ 読み込み失敗: ' + err.message);
    }
  };
  reader.readAsText(file);
  this.value = ''; // reset so same file can be re-imported
});

// Utils
function copyText(t) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function(){ toast('コピーしました'); }).catch(function(){ fbCopy(t); });
  } else { fbCopy(t); }
}
function fbCopy(t) {
  var a = document.createElement('textarea');
  a.value=t; a.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(a); a.focus(); a.select();
  try{ document.execCommand('copy'); toast('コピーしました'); }catch(e){}
  document.body.removeChild(a);
}
var toastT;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ el.classList.remove('on'); }, 2200);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

document.getElementById('vcnt').textContent = S.vocab.length+' 語';
document.getElementById('btn-dark').textContent = isDark ? '☀️' : '🌙';
